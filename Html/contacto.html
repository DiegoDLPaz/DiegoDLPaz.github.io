    <div id="main-content">
        <h1>Contactame</h1>
        <h2>Formulario contacto</h2>
        <form action="contactar.php" method="post">
            <fieldset>
                <legend>Datos personales</legend>
                <label for="nombre"> Nombre:</label>
                <input type="text" required="required" name="nombre" id="nombre" placeholder="Introduce tu nombre...">
                <br/>
                <label for="apellidos"> Apellidos:</label> 
                <input type="text" name="apellidos"  required="required" id="apellidos" placeholder="Introduce tu apellidos...">
                <br/>
                <label for="email"> Email:</label> 
                <input type="text" required="required" name="email" id="email" placeholder="Introduce tu mail..." pattern="{1} @">
                <br/>
                <label for="fecha">Fecha de nacimiento:</label>
                <input type="date" name="fecha" id="fecha" required="required">
                <br/>
                <label for="edad">Edad:</label>
                <input type="number" name="edad" id="edad" pattern="[18-100]" required="required">
                <br/>
                <label for="Sexo">Sexo:</label>
                <input type="radio" name="sexo" id="sexo" value="hombre" checked="checked">Hombre 
                <input type="radio" name="sexo" id="sexo" value="mujer">Mujer
                <br/>
                <label for="pais">País</label>
                <select name="pais" id="pais">
                    <option value="selecciona" selected="selected">-selecciona-</option>
                    <option value="portugal">Portugal</option>
                    <option value="espania">España</option>
                    <option value="francia">Francia</option>
                    <option value="italia">Italia</option>
                </select>
            </fieldset>
            <fieldset>
                <legend>Otros Datos</legend>
                <label for="mensaje">Mensaje:</label>
                <textarea name="mensaje" id="mensaje" cols="50" rows="10"></textarea>
                <br/>
                <label for="archivo">Adjuntar una foto...</label>
                <input type="file" name="archivo" id="archivo">
                <br/>
            </fieldset>
                <input type="checkbox" name="condiciones" id="condiciones" value="condiciones">
                <label for="condiciones">He leido las condiciones ...</label>
                <br/>
                <label for="limpiar"></label>
                <input type="reset" name="limpiar" value="Limpiar" >
                <label for="enviar"></label>
                <input type="submit" name="enviar" value="Enviar">
            </form>
